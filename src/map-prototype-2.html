<html lang="en">

    <style>
      :root {
        --bg: #0d0c0a;
        --panel: #1a1814;
        --panel-line: #4d4638;
        --ink: #ece3c9;
        --muted: #b6ab8b;
        --room-fill: #262319;
        --room-line: #a3966f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background: radial-gradient(circle at 20% 10%, #1f1a14 0%, var(--bg) 55%);
        color: var(--ink);
        min-height: 100vh;
      }

      .page {
        width: 100vw;
        height: 100vh;
        margin: 0;
        padding: 12px;
        display: flex;
        flex-direction: column;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        font-weight: 700;
      }

      p {
        margin: 0 0 12px;
        color: var(--muted);
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin-bottom: 14px;
        color: var(--muted);
      }

      .controls label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .frame {
        border: 1px solid var(--panel-line);
        background: linear-gradient(180deg, #17140f 0%, #13110d 100%);
        overflow: hidden;
        flex: 1;
        min-height: 0;
      }

      svg {
        width: 100%;
        height: 100%;
        display: block;
        cursor: grab;
        user-select: none;
      }

      svg.dragging {
        cursor: grabbing;
      }

      .layer {
        fill: #191611;
        stroke: var(--panel-line);
        stroke-width: 1;
      }

      .layer-title {
        fill: var(--muted);
        font-size: 18px;
        text-anchor: middle;
      }

      .room {
        fill: var(--room-fill);
        stroke: var(--room-line);
        stroke-width: 1.3;
      }

      .room-section-b {
        stroke: #8fb9cf;
      }

      .room-section-c {
        stroke: #c6aa78;
      }

      .room-label {
        fill: var(--ink);
        font-size: 14px;
        text-anchor: middle;
        dominant-baseline: central;
      }

      .room-label-id {
        fill: var(--muted);
        font-size: 11px;
        text-anchor: middle;
        dominant-baseline: central;
      }

      .legend-item-label {
        fill: var(--muted);
        font-size: 11px;
        text-anchor: start;
        dominant-baseline: central;
      }

      .grid-meta-label {
        fill: var(--muted);
        font-size: 11px;
        text-anchor: start;
        dominant-baseline: central;
      }

      .building-frame {
        fill: rgba(43, 38, 29, 0.24);
        stroke: rgba(203, 189, 151, 0.45);
        stroke-width: 1;
        stroke-dasharray: 8 6;
        rx: 14;
      }

      .building-layer-band {
        fill: rgba(20, 18, 13, 0.48);
        stroke: rgba(120, 110, 88, 0.32);
        stroke-width: 1;
      }

      .building-frame-main {
        stroke: rgba(198, 170, 120, 0.8);
      }

      .building-frame-campus {
        stroke: rgba(143, 185, 207, 0.8);
      }

      .building-frame-underground {
        stroke: rgba(169, 154, 207, 0.8);
      }

      .section-title {
        fill: #d7cbab;
        font-size: 16px;
        font-weight: 700;
      }

      .legend-title {
        fill: #d7cbab;
        font-size: 14px;
        font-weight: 700;
      }

      .campus-road {
        fill: rgba(161, 145, 110, 0.22);
        stroke: rgba(194, 178, 142, 0.55);
        stroke-width: 1.2;
      }

      .campus-building {
        fill: rgba(42, 37, 28, 0.72);
        stroke: rgba(203, 189, 151, 0.8);
        stroke-width: 1.5;
        rx: 16;

        fill: rgba(54, 45, 32, 0.8);
      }

      .campus-accent {
        stroke: rgba(143, 185, 207, 0.85);
      }

      .campus-label {
        fill: #f0e6c9;
        font-size: 24px;
        font-weight: 700;
        text-anchor: middle;
      }

      .campus-sub {
        fill: #bfb290;
        font-size: 13px;
        text-anchor: middle;
      }

      .tile-grid-line {
        stroke: rgba(150, 140, 120, 0.2);
        stroke-width: 1;
      }

      .tile-grid-major {
        stroke: rgba(187, 172, 138, 0.3);
        stroke-width: 1.2;
      }

      .tile-grid-point {
        fill: rgba(206, 191, 156, 0.42);
      }

      .tile-grid-cell {
        fill: rgba(92, 84, 66, 0.08);
        stroke: rgba(176, 162, 128, 0.35);
        stroke-width: 1;
      }

      .tile-room-known {
        fill: transparent;
        stroke: #f4f2ea;
        stroke-width: 2.2;
      }

      .tile-room-title {
        fill: #ffffff;
        font-size: 11px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: central;
        pointer-events: none;
      }

      .tile-grid-coord {
        fill: rgba(230, 220, 192, 0.72);
        font-size: 11px;
        text-anchor: middle;
        dominant-baseline: central;
      }

      .dir-line {
        stroke-width: 2.2;
        fill: none;
        marker-end: url(#arrow-grid);
      }

      .dir-label {
        fill: #e8ddbf;
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
      }

      .floor-select {
        background: #17140f;
        color: var(--ink);
        border: 1px solid var(--panel-line);
        padding: 4px 8px;
        border-radius: 6px;
      }

      .room-node {
        fill: rgba(143, 185, 207, 0.22);
        stroke: rgba(143, 185, 207, 0.92);
        stroke-width: 1.2;
      }

      .room-node-brown {
        fill: rgba(198, 170, 120, 0.22);
        stroke: rgba(198, 170, 120, 0.92);
      }

        fill: rgba(143, 185, 207, 0.22);
        stroke: rgba(143, 185, 207, 0.92);
      }

        fill: rgba(185, 175, 150, 0.2);
        stroke: rgba(185, 175, 150, 0.8);

      .room-node-label {
        fill: #efe6c8;
        font-size: 10px;
        text-anchor: middle;
        dominant-baseline: central;
        pointer-events: none;
      }

      .room-node-title {
        fill: #f2ead1;
        font-size: 10px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: central;
        pointer-events: none;
      }

      .edge-compare {
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        opacity: 0.95;
      }

      .edge-match {
        stroke: #f4f2ea;
      }

      .edge-engine-only {
        stroke: #5be08a;
      }

      .edge-presentation-only {
        stroke: #ff6f6f;
      }

          x: TILE_GRID.originX + c * STEP_E.dx + r * STEP_S.dx,
          y: TILE_GRID.originY + c * STEP_E.dy + r * STEP_S.dy
        };
      }

      function gridAnchor(c, rFromTop) {
        return {
          x: TILE_GRID.originX + c * STEP_E.dx + rFromTop * STEP_S.dx,
          y: TILE_GRID.originY + c * STEP_E.dy + rFromTop * STEP_S.dy
        };
      }

      function tileLegendFrame() {
        const gridCorners = [
          gridAnchor(0, 0),
          gridAnchor(TILE_GRID.cols, 0),
          gridAnchor(0, TILE_GRID.rows),
          gridAnchor(TILE_GRID.cols, TILE_GRID.rows)
        ];
        const gridMinX = Math.min(...gridCorners.map((p) => p.x));
        const a1Anchor = anchorAtTile(0, 1);
        const a1P1 = { x: a1Anchor.x + ISO_BASIS_E.dx, y: a1Anchor.y + ISO_BASIS_E.dy };
        const a1P3 = { x: a1Anchor.x + ISO_BASIS_S.dx, y: a1Anchor.y + ISO_BASIS_S.dy };
        const a1P2 = { x: a1P1.x + ISO_BASIS_S.dx, y: a1P1.y + ISO_BASIS_S.dy };
        const a1BottomY = Math.max(a1Anchor.y, a1P1.y, a1P2.y, a1P3.y);

        const w = 1170;
        const h = 520;
        const x = Math.max(30, gridMinX - 120);
        const y = a1BottomY - h;
        return { x, y, w, h };
      }

      function colToLetters(index) {
        let n = index + 1;
        let s = "";
        while (n > 0) {
          const rem = (n - 1) % 26;
          s = String.fromCharCode(65 + rem) + s;
          n = Math.floor((n - 1) / 26);
        }
        return s;
      }

      function lettersToCol(letters) {
        let n = 0;
        const s = String(letters || "").toUpperCase();
        for (let i = 0; i < s.length; i += 1) {
          const code = s.charCodeAt(i);
          if (code < 65 || code > 90) continue;
          n = n * 26 + (code - 64);
        }
        return Math.max(0, n - 1);
      }

      function parseTileLabel(tileLabel) {
        const m = /^([A-Za-z]+)(\d+)$/.exec(String(tileLabel || "").trim());
        if (!m) return null;
        const c = lettersToCol(m[1]);
        const rank = Number(m[2]);
        if (!Number.isFinite(rank)) return null;
        return { c, rank };
      }

      function tileCenter(c, rank) {
        const p0 = anchorAtTile(c, rank);
        return {
          x: p0.x + (ISO_BASIS_E.dx + ISO_BASIS_S.dx) * 0.5,
          y: p0.y + (ISO_BASIS_E.dy + ISO_BASIS_S.dy) * 0.5
        };
      }

      function tileCorners(c, rank) {
        const p0 = anchorAtTile(c, rank);
        const p1 = { x: p0.x + ISO_BASIS_E.dx, y: p0.y + ISO_BASIS_E.dy };
        const p3 = { x: p0.x + ISO_BASIS_S.dx, y: p0.y + ISO_BASIS_S.dy };
        const p2 = { x: p1.x + ISO_BASIS_S.dx, y: p1.y + ISO_BASIS_S.dy };
        return { p0, p1, p2, p3 };
      }

      function tilesInBounds(bounds) {
        const c0 = Math.min(bounds.tl.c, bounds.br.c);
        const c1 = Math.max(bounds.tl.c, bounds.br.c);
        const rankBottom = Math.min(bounds.tl.rank, bounds.br.rank);
        const rankTop = Math.max(bounds.tl.rank, bounds.br.rank);
        const tiles = [];
        for (let rank = rankTop; rank >= rankBottom; rank -= 1) {
          for (let c = c0; c <= c1; c += 1) {
            tiles.push({ c, rank });
          }
        }
        return tiles;

              ? "room-node room-node-brown"
              : room.building === "central" ||
                  room.building === "computer" ||
                  room.building === "temp" ||
                  room.building === "main" ||
                  room.building === "corridor" ||
                  room.building === "dome"
                ? "room-node room-node-main"
                : "room-node room-node-other";

          const node = add("circle", { class: nodeClass, cx, cy, r: 10 });
          const title = document.createElementNS("http://www.w3.org/2000/svg", "title");
          title.textContent =
            room.label +
            " [" +
            (room.locationId || room.id) +
            "] | building=" +
            room.building +
            " | layer=" +
            room.layer +
            " | tile=" +
            room.tileLabel;
          node.appendChild(title);

          add(
            "text",
            { class: "room-node-label", x: cx, y: cy + 0.5 },
            typeof room.locationId === "number" ? String(room.locationId) : room.id
          );
        }
      }

      function getVisibleCenterByLocationId(layerFilter) {
        const centerByLocationId = new Map();
        const visibleRooms = ROOM_TILE_METADATA.filter((room) => layerFilter === "all" || room.layer === layerFilter);
        for (const room of visibleRooms) {
          if (typeof room.locationId !== "number") continue;
          const center = tileCenter(room.tile.c, room.tile.rank);
          centerByLocationId.set(room.locationId, {
            x: center.x,
            y: center.y + 24,
            c: room.tile.c,
            rank: room.tile.rank
          });
        }
        return centerByLocationId;
      }

      function buildEdgeComparisonSet() {
        const presentationEdges = [];
        for (const room of MAP_MODEL.rooms) {
          const fromId = LOCATION_ID_BY_NODE_ID[room.id];
          if (typeof fromId !== "number") continue;
          for (const edge of room.edges || []) {
            const toId = LOCATION_ID_BY_NODE_ID[edge.to];
            if (typeof toId !== "number") continue;
            presentationEdges.push({
              from: fromId,
              to: toId,
              command: String(edge.label || ""),
              source: "presentation"
            });
          }
        }

        const pairKey = (e) => e.from + "->" + e.to;
        const edgeKey = (e) => e.from + "->" + e.to + "|" + String(e.command || "").toLowerCase() + "|" + e.source;
        const presentationPairSet = new Set(presentationEdges.map(pairKey));
        const enginePairSet = new Set(ENGINE_EDGE_SNAPSHOT.map(pairKey));
        const combined = [];
        const seen = new Set();

        for (const edge of presentationEdges) {
          const typed = {
            ...edge,
            type: enginePairSet.has(pairKey(edge)) ? "match" : "presentation-only"
          };
          const key = edgeKey(typed);
          if (seen.has(key)) continue;
          seen.add(key);
          combined.push(typed);
        }

        for (const edge of ENGINE_EDGE_SNAPSHOT) {
          if (presentationPairSet.has(pairKey(edge))) continue;
          const typed = {
            ...edge,
            source: "engine",
            type: "engine-only"
          };
          const key = edgeKey(typed);
          if (seen.has(key)) continue;
          seen.add(key);
          combined.push(typed);
        }

        return combined;
      }

      function drawEdgeComparison(layerFilter) {
        const centerByLocationId = getVisibleCenterByLocationId(layerFilter);
        const edgeSet = buildEdgeComparisonSet();
        const edgeClassByType = {
          match: "edge-compare edge-match",
          "engine-only": "edge-compare edge-engine-only",
          "presentation-only": "edge-compare edge-presentation-only"
        };

        const primaryDir = (command) => {
          const s = String(command || "").toLowerCase();
          if (s.includes("west")) return "west";
          if (s.includes("east")) return "east";
          if (s.includes("north")) return "north";
          if (s.includes("south")) return "south";
          return null;
        };

        const centerAtGrid = (c, rank) => {
          const p = tileCenter(c, rank);
          return { x: p.x, y: p.y + 24 };
        };

        // Route bends in tile-space, so corners follow the map's projected grid axes.
        const orthogonalPath = (from, to, dir) => {
          const hasGrid = Number.isFinite(from.c) && Number.isFinite(from.rank) && Number.isFinite(to.c) && Number.isFinite(to.rank);
          if (!hasGrid) {
            return "M " + from.x + " " + from.y + " L " + to.x + " " + to.y;
          }

          if ((dir === "west" || dir === "east") && Math.abs(from.rank - to.rank) > 0.001) {
            const midC = (from.c + to.c) / 2;
            const p1 = centerAtGrid(midC, from.rank);
            const p2 = centerAtGrid(midC, to.rank);
            return "M " + from.x + " " + from.y + " L " + p1.x + " " + p1.y + " L " + p2.x + " " + p2.y + " L " + to.x + " " + to.y;
          }
          if ((dir === "north" || dir === "south") && Math.abs(from.c - to.c) > 0.001) {
            const midR = (from.rank + to.rank) / 2;
            const p1 = centerAtGrid(from.c, midR);
            const p2 = centerAtGrid(to.c, midR);
            return "M " + from.x + " " + from.y + " L " + p1.x + " " + p1.y + " L " + p2.x + " " + p2.y + " L " + to.x + " " + to.y;
          }
          return "M " + from.x + " " + from.y + " L " + to.x + " " + to.y;
        };

        for (const edge of edgeSet) {
          const from = centerByLocationId.get(edge.from);
          const to = centerByLocationId.get(edge.to);
          if (!from || !to) continue;
          add("path", {
            class: edgeClassByType[edge.type] || "edge-compare edge-match",
            d: orthogonalPath(from, to, primaryDir(edge.command))
          });
        }
      }

      function blockPoints(block) {
        if (block.bounds) {
          const c0 = Math.min(block.bounds.tl.c, block.bounds.br.c);
          const c1 = Math.max(block.bounds.tl.c, block.bounds.br.c);
          const rankTop = Math.max(block.bounds.tl.rank, block.bounds.br.rank);
          const rankBottom = Math.min(block.bounds.tl.rank, block.bounds.br.rank);
          const spanCols = c1 - c0;
          const spanRows = rankTop - rankBottom;

          const p0 = anchorAtTile(c0, rankTop);
          // Include both:
          // - tile footprint (ISO_BASIS_*)
          // - gutter spacing between adjacent tile anchors (STEP_*)
          const p1 = {
            x: p0.x + spanCols * STEP_E.dx + ISO_BASIS_E.dx,
            y: p0.y + spanCols * STEP_E.dy + ISO_BASIS_E.dy
          };
          const p3 = {
            x: p0.x + spanRows * STEP_S.dx + ISO_BASIS_S.dx,
            y: p0.y + spanRows * STEP_S.dy + ISO_BASIS_S.dy
          };
          const p2 = {
            x: p1.x + spanRows * STEP_S.dx + ISO_BASIS_S.dx,
            y: p1.y + spanRows * STEP_S.dy + ISO_BASIS_S.dy
          };
          return [p0, p1, p2, p3];
        }

        const len = (v) => Math.hypot(v.dx, v.dy) || 1;
        const UNIT_E = { dx: ISO_BASIS_E.dx / len(ISO_BASIS_E), dy: ISO_BASIS_E.dy / len(ISO_BASIS_E) };
        const N_AXIS = { dx: -ISO_BASIS_S.dx, dy: -ISO_BASIS_S.dy };
        const UNIT_N = { dx: N_AXIS.dx / len(N_AXIS), dy: N_AXIS.dy / len(N_AXIS) };
        if (
          !Number.isFinite(block.x) ||
          !Number.isFinite(block.y) ||
          !Number.isFinite(block.w) ||
          !Number.isFinite(block.h)
        ) {
          return [];
        }
        const u = block.orient === "N" ? UNIT_N : UNIT_E;
        const v = block.orient === "N" ? UNIT_E : UNIT_N;
        const p0 = { x: block.x, y: block.y };
        const p1 = { x: p0.x + u.dx * block.w, y: p0.y + u.dy * block.w };
        const p3 = { x: p0.x + v.dx * block.h, y: p0.y + v.dy * block.h };
        const p2 = { x: p1.x + v.dx * block.h, y: p1.y + v.dy * block.h };
        return [p0, p1, p2, p3];
      }

      function drawCampusLayout(showRoads) {
        for (const block of CAMPUS_BLOCKS) {
          if (block.hidden) continue;
          if ((block.type === "road-h" || block.type === "road-v") && !showRoads) continue;
          const pts = blockPoints(block);
          if (!pts.length) continue;
          const points = pts.map((p) => p.x + "," + p.y).join(" ");
          const cx = (pts[0].x + pts[1].x + pts[2].x + pts[3].x) / 4;
          const cy = (pts[0].y + pts[1].y + pts[2].y + pts[3].y) / 4;

          if (block.type === "road-h" || block.type === "road-v") {
            add("polygon", { class: "campus-road", points });
            add("text", { class: "campus-label", x: cx, y: cy + 6 }, block.label);
            continue;
          }

          const className =
            block.type === "building-central" ? "campus-building campus-central campus-accent" : "campus-building";
          add("polygon", { class: className, points });
          add("text", { class: "campus-label", x: cx, y: cy - 10 }, block.label);
          if (block.sub) {
            add("text", { class: "campus-sub", x: cx, y: cy + 16 }, block.sub);
          }
        }
      }

      function drawLegend() {
        const frame = tileLegendFrame();
        const gutterPx = TILE_GUTTER_SIDE * TILE_GRID.cellW;
        const x = frame.x;
        const y = frame.y - gutterPx - 122;
        add("rect", {
          class: "building-frame",
          x,
          y,
          width: 470,
          height: 122
        });
        add("text", { class: "legend-title", x: x + 16, y: y + 24 }, "Legend");
        add("rect", { class: "campus-building campus-central", x: x + 16, y: y + 38, width: 36, height: 20 });
        add("text", { class: "legend-item-label", x: x + 92, y: y + 50 }, "central complex building");
        add("rect", { class: "campus-building", x: x + 16, y: y + 66, width: 36, height: 20 });
        add("text", { class: "legend-item-label", x: x + 92, y: y + 78 }, "standalone building");
        add("rect", { class: "campus-road", x: x + 16, y: y + 94, width: 36, height: 12, rx: 5 });
        add("text", { class: "legend-item-label", x: x + 92, y: y + 102 }, "street/road");
        add("text", { class: "legend-item-label", x: x + 300, y: y + 78 }, "room nodes filtered by floor layer");
      }

      function drawDirectionArrow(x, y, dx, dy, label, stroke) {
        add("line", { class: "dir-line", x1: x, y1: y, x2: x + dx, y2: y + dy, stroke });
        add("text", { class: "dir-label", x: x + dx + Math.sign(dx || 1) * 18, y: y + dy + (dy < 0 ? -8 : 14) }, label);
      }

      function drawPlacementGridAndLegend(showLegend) {
        const gridX0 = TILE_GRID.originX;
        const gridY0 = TILE_GRID.originY;
        const anchorAt = (c, r) => ({
          x: gridX0 + c * STEP_E.dx + r * STEP_S.dx,
          y: gridY0 + c * STEP_E.dy + r * STEP_S.dy
        });

        for (let c = 0; c < TILE_GRID.cols; c += 1) {
          for (let r = 0; r < TILE_GRID.rows; r += 1) {
            const p0 = anchorAt(c, r);
            const p1 = { x: p0.x + ISO_BASIS_E.dx, y: p0.y + ISO_BASIS_E.dy };
            const p3 = { x: p0.x + ISO_BASIS_S.dx, y: p0.y + ISO_BASIS_S.dy };
            const p2 = { x: p1.x + ISO_BASIS_S.dx, y: p1.y + ISO_BASIS_S.dy };
            const className = "tile-grid-cell";
            add("polygon", {
              class: className,
              points: p0.x + "," + p0.y + " " + p1.x + "," + p1.y + " " + p2.x + "," + p2.y + " " + p3.x + "," + p3.y
            });

            const center = {
              x: p0.x + (ISO_BASIS_E.dx + ISO_BASIS_S.dx) * 0.5,
              y: p0.y + (ISO_BASIS_E.dy + ISO_BASIS_S.dy) * 0.5
            };
            const file = colToLetters(c);
            const rank = TILE_GRID.rows - r; // A1 = bottom-left
            add("text", { class: "tile-grid-coord", x: center.x, y: center.y }, file + rank);
          }
        }
        for (let c = 0; c <= TILE_GRID.cols; c += 1) {
          for (let r = 0; r <= TILE_GRID.rows; r += 1) {
            const p = anchorAt(c, r);
            add("circle", {
              class: "tile-grid-point",
              cx: p.x,
              cy: p.y,
              r: 2.2
            });
          }
        }

        const frame = tileLegendFrame();
        const legendW = frame.w;
        const legendH = frame.h;
        const legendX = frame.x;
        const legendY = frame.y;
        const vx = legendX + 330;
        const vy = legendY + 310;

        if (showLegend) {
          const fmt = (n) => Number(n).toFixed(2);
          add("rect", { class: "building-frame", x: legendX, y: legendY, width: legendW, height: legendH });
          add("text", { class: "legend-title", x: legendX + 20, y: legendY + 26 }, "Tile Direction Grid");
          add(
            "text",
            { class: "grid-meta-label", x: legendX + 20, y: legendY + 50 },
              "iso tile basis: E(" +
              fmt(ISO_BASIS_E.dx) +
              "," +
              fmt(ISO_BASIS_E.dy) +
              "), S(" +
              fmt(ISO_BASIS_S.dx) +
              "," +
              fmt(ISO_BASIS_S.dy) +
              "), N tilt=" +
              TILE_GRID.northTiltFromVerticalDeg +
              "deg, gutter=0.5 tile/side (step=2.0x), level=" +
              TILE_GRID.levelY
          );
          add("circle", { class: "tile-grid-point", cx: vx, cy: vy, r: 4 });
          add("text", { class: "grid-meta-label", x: vx + 52, y: vy + 4 }, "origin");

          const scale = 0.55;
          drawDirectionArrow(vx, vy, DIRECTION_VECTORS.N.dx * scale, DIRECTION_VECTORS.N.dy * scale, "N", "#8fb9cf");
          drawDirectionArrow(vx, vy, DIRECTION_VECTORS.NE.dx * scale, DIRECTION_VECTORS.NE.dy * scale, "NE", "#8fb9cf");
          drawDirectionArrow(vx, vy, DIRECTION_VECTORS.E.dx * scale, DIRECTION_VECTORS.E.dy * scale, "E", "#8fb9cf");
          drawDirectionArrow(vx, vy, DIRECTION_VECTORS.SE.dx * scale, DIRECTION_VECTORS.SE.dy * scale, "SE", "#8fb9cf");
          drawDirectionArrow(vx, vy, DIRECTION_VECTORS.S.dx * scale, DIRECTION_VECTORS.S.dy * scale, "S", "#8fb9cf");
          drawDirectionArrow(vx, vy, DIRECTION_VECTORS.SW.dx * scale, DIRECTION_VECTORS.SW.dy * scale, "SW", "#8fb9cf");
          drawDirectionArrow(vx, vy, DIRECTION_VECTORS.W.dx * scale, DIRECTION_VECTORS.W.dy * scale, "W", "#8fb9cf");
          drawDirectionArrow(vx, vy, DIRECTION_VECTORS.NW.dx * scale, DIRECTION_VECTORS.NW.dy * scale, "NW", "#8fb9cf");
          drawDirectionArrow(vx + 240, vy, DIRECTION_VECTORS.UP.dx, DIRECTION_VECTORS.UP.dy * 0.55, "UP", "#d8cfb3");
          drawDirectionArrow(vx + 240, vy, DIRECTION_VECTORS.DOWN.dx, DIRECTION_VECTORS.DOWN.dy * 0.55, "DOWN", "#d8cfb3");
        }
      }

      function draw() {
        svg.innerHTML = "";
        viewport = null;
        const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
        svg.appendChild(defs);
        viewport = document.createElementNS("http://www.w3.org/2000/svg", "g");
        viewport.setAttribute("id", "viewport");
        svg.appendChild(viewport);

        const marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
        marker.setAttribute("id", "arrow");
        marker.setAttribute("viewBox", "0 0 10 10");
        marker.setAttribute("refX", "9");
        marker.setAttribute("refY", "5");
        marker.setAttribute("markerWidth", "8");
        marker.setAttribute("markerHeight", "8");
        marker.setAttribute("orient", "auto-start-reverse");
        defs.appendChild(marker);
        const arrowPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
        arrowPath.setAttribute("d", "M 0 0 L 10 5 L 0 10 z");
        arrowPath.setAttribute("fill", "#d8cfb3");
        marker.appendChild(arrowPath);

        const enterMarker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
        enterMarker.setAttribute("id", "arrow-enter");
        enterMarker.setAttribute("viewBox", "0 0 10 10");
        enterMarker.setAttribute("refX", "9");
        enterMarker.setAttribute("refY", "5");
        enterMarker.setAttribute("markerWidth", "8");
        enterMarker.setAttribute("markerHeight", "8");
        enterMarker.setAttribute("orient", "auto-start-reverse");
        defs.appendChild(enterMarker);
        const enterPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
        enterPath.setAttribute("d", "M 0 0 L 10 5 L 0 10 z");
        enterPath.setAttribute("fill", "#93b7ff");
        enterMarker.appendChild(enterPath);

        const gridMarker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
        gridMarker.setAttribute("id", "arrow-grid");
        gridMarker.setAttribute("viewBox", "0 0 10 10");
        gridMarker.setAttribute("refX", "9");
        gridMarker.setAttribute("refY", "5");
        gridMarker.setAttribute("markerWidth", "7");
        gridMarker.setAttribute("markerHeight", "7");
        gridMarker.setAttribute("orient", "auto-start-reverse");
        defs.appendChild(gridMarker);
        const gridPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
        gridPath.setAttribute("d", "M 0 0 L 10 5 L 0 10 z");
        gridPath.setAttribute("fill", "#d8cfb3");
        gridMarker.appendChild(gridPath);

        add("rect", { x: 0, y: 0, width: WORLD_W, height: WORLD_H, fill: "transparent" });

        const showRoads = document.getElementById("toggle-roads").checked;
        const showLegend = document.getElementById("toggle-legend").checked;
        const showGrid = document.getElementById("toggle-grid").checked;
        const floorFilter = document.getElementById("floor-filter").value;
        drawCampusLayout(showRoads);
        drawEdgeComparison(floorFilter);
        drawRoomLayer(floorFilter);
        if (showLegend) drawLegend();
        if (showGrid) drawPlacementGridAndLegend(showLegend);

        if (!panZoom.hasUserMoved) {
          setInitialView();
        } else {
          applyTransform();
        }
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function applyTransform() {
        if (!viewport) return;
        if (!Number.isFinite(panZoom.tx) || !Number.isFinite(panZoom.ty) || !Number.isFinite(panZoom.scale)) return;
        viewport.setAttribute(
          "transform",
          "translate(" + panZoom.tx.toFixed(2) + " " + panZoom.ty.toFixed(2) + ") scale(" + panZoom.scale.toFixed(4) + ")"
        );
      }

      function setInitialView() {
        const rect = svg.getBoundingClientRect();
        if (!CAMPUS_BLOCKS.length) return;
        const allPoints = CAMPUS_BLOCKS.flatMap((block) => blockPoints(block));
        if (!allPoints.length) return;

        const minX = Math.min(...allPoints.map((p) => p.x)) - 180;
        const maxX = Math.max(...allPoints.map((p) => p.x)) + 180;
        const minY = Math.min(...allPoints.map((p) => p.y)) - 140;
        const maxY = Math.max(...allPoints.map((p) => p.y)) + 160;
        const mapW = Math.max(1, maxX - minX);
        const mapH = Math.max(1, maxY - minY);

        const outerPadX = 24;
        const outerPadTop = 16;
        const outerPadBottom = 20;
        const usableW = Math.max(1, rect.width - outerPadX * 2);
        const usableH = Math.max(1, rect.height - outerPadTop - outerPadBottom);

        const fitScale = Math.min(usableW / mapW, usableH / mapH);
        panZoom.scale = clamp(fitScale, panZoom.minScale, panZoom.maxScale);

        const anchorAtByRow = (col, rowFromTop) => ({
          x: TILE_GRID.originX + col * STEP_E.dx + rowFromTop * STEP_S.dx,
          y: TILE_GRID.originY + col * STEP_E.dy + rowFromTop * STEP_S.dy
        });
        const tileCenter = (fileIndex, rank) => {
          const rowFromTop = TILE_GRID.rows - rank;
          const p0 = anchorAtByRow(fileIndex, rowFromTop);
          return {
            x: p0.x + (ISO_BASIS_E.dx + ISO_BASIS_S.dx) * 0.5,
            y: p0.y + (ISO_BASIS_E.dy + ISO_BASIS_S.dy) * 0.5
          };
        };
        // Focus start view on midpoint between G6 and H6.
        const g6 = tileCenter(6, 6);
        const h6 = tileCenter(7, 6);
        const target = {
          x: (g6.x + h6.x) / 2,
          y: (g6.y + h6.y) / 2
        };

        panZoom.tx = rect.width / 2 - target.x * panZoom.scale;
        panZoom.ty = rect.height / 2 - target.y * panZoom.scale;
        applyTransform();
      }

      function onPointerDown(event) {
        if (event.button !== 0) return;
        panZoom.dragging = true;
        panZoom.lastX = event.clientX;
        panZoom.lastY = event.clientY;
        svg.classList.add("dragging");
      }

      function onPointerMove(event) {
        if (!panZoom.dragging) return;
        const dx = event.clientX - panZoom.lastX;
        const dy = event.clientY - panZoom.lastY;
        panZoom.lastX = event.clientX;
        panZoom.lastY = event.clientY;
        panZoom.tx += dx;
        panZoom.ty += dy;
        panZoom.hasUserMoved = true;
        applyTransform();
      }

      function onPointerUp() {
        if (!panZoom.dragging) return;
        panZoom.dragging = false;
        svg.classList.remove("dragging");
      }

      function onWheel(event) {
        event.preventDefault();
        const rect = svg.getBoundingClientRect();
        const sx = event.clientX - rect.left;
        const sy = event.clientY - rect.top;
        const zoomFactor = event.deltaY < 0 ? 1.1 : 0.9;
        const nextScale = clamp(panZoom.scale * zoomFactor, panZoom.minScale, panZoom.maxScale);
        const wx = (sx - panZoom.tx) / panZoom.scale;
        const wy = (sy - panZoom.ty) / panZoom.scale;
        panZoom.scale = nextScale;
        panZoom.tx = sx - wx * panZoom.scale;
        panZoom.ty = sy - wy * panZoom.scale;
        panZoom.hasUserMoved = true;
        applyTransform();
      }

      document.getElementById("toggle-roads").addEventListener("change", draw);
      document.getElementById("toggle-legend").addEventListener("change", draw);
      document.getElementById("toggle-grid").addEventListener("change", draw);
      document.getElementById("floor-filter").addEventListener("change", draw);
      svg.addEventListener("mousedown", onPointerDown);
      window.addEventListener("mousemove", onPointerMove);
      window.addEventListener("mouseup", onPointerUp);
      svg.addEventListener("mouseleave", onPointerUp);
      svg.addEventListener("wheel", onWheel, { passive: false });
      window.addEventListener("resize", () => {
        if (!panZoom.hasUserMoved) {
          setInitialView();
        } else {
          applyTransform();
        }
      });
      draw();
    </script>
  </body>
</html>
