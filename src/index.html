<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Lurking Horror - Web Interpreter</title>
    <style>
      :root {
        --bg-0: #0a101a;
        --bg-1: #162236;
        --panel: rgba(7, 12, 22, 0.86);
        --panel-border: rgba(146, 197, 255, 0.22);
        --text-main: #d5ecff;
        --text-dim: #8fb2cf;
        --accent: #8cf7d6;
        --accent-2: #ffdc97;
        --danger: #ff7e7e;
        --shadow: 0 22px 60px rgba(2, 9, 18, 0.6);
        --radius: 16px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        font-family: "Cascadia Code", "Fira Code", "Consolas", "Courier New", monospace;
        color: var(--text-main);
        background:
          radial-gradient(140% 120% at 0% 0%, #253759 0%, transparent 58%),
          radial-gradient(120% 120% at 100% 100%, #2a4e49 0%, transparent 52%),
          linear-gradient(160deg, var(--bg-1), var(--bg-0));
        display: grid;
        place-items: center;
        padding: clamp(10px, 2vw, 20px);
      }

      .shell {
        width: min(980px, 100%);
        height: min(760px, 100%);
        display: grid;
        grid-template-rows: auto 1fr auto;
        border: 1px solid var(--panel-border);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
        overflow: hidden;
        backdrop-filter: blur(6px);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--panel-border);
        background: linear-gradient(180deg, rgba(12, 23, 38, 0.9), rgba(10, 18, 30, 0.6));
      }

      .title {
        margin: 0;
        font-size: clamp(0.95rem, 1.7vw, 1.2rem);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--accent-2);
      }

      .hint {
        font-size: 0.8rem;
        color: var(--text-dim);
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      .btn {
        border: 1px solid rgba(145, 197, 255, 0.3);
        background: rgba(8, 16, 28, 0.86);
        color: var(--text-main);
        border-radius: 8px;
        font: inherit;
        font-size: 0.8rem;
        padding: 6px 10px;
        cursor: pointer;
      }

      .btn:hover {
        border-color: rgba(140, 247, 214, 0.65);
      }

      .output {
        overflow-y: auto;
        padding: 18px 16px 20px;
        line-height: 1.45;
      }

      .line {
        white-space: pre-wrap;
        margin: 0 0 0.42rem;
        animation: reveal 180ms ease-out;
      }

      .line.command {
        color: var(--accent);
      }

      .line.system {
        color: var(--text-dim);
      }

      .line.error {
        color: var(--danger);
      }

      .status {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        border-top: 1px solid var(--panel-border);
        border-bottom: 1px solid var(--panel-border);
        padding: 8px 14px;
        font-size: 0.85rem;
        color: var(--text-dim);
      }

      .input-row {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 10px;
        align-items: center;
        padding: 12px 14px 14px;
      }

      .prompt {
        color: var(--accent);
        font-weight: 700;
      }

      .command-input {
        width: 100%;
        border: 1px solid rgba(145, 197, 255, 0.22);
        background: rgba(5, 10, 17, 0.75);
        color: var(--text-main);
        border-radius: 10px;
        padding: 10px 12px;
        font: inherit;
        outline: none;
        transition: border-color 140ms ease, box-shadow 140ms ease, background 140ms ease;
      }

      .command-input:focus {
        border-color: rgba(140, 247, 214, 0.72);
        box-shadow: 0 0 0 3px rgba(140, 247, 214, 0.16);
        background: rgba(5, 10, 17, 0.9);
      }

      @keyframes reveal {
        from {
          opacity: 0;
          transform: translateY(3px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 700px) {
        body {
          padding: 8px;
        }

        .shell {
          height: 100%;
          border-radius: 12px;
        }

        .topbar {
          padding: 10px 12px;
        }

        .hint {
          display: none;
        }

        .output {
          padding: 14px 12px 16px;
          font-size: 0.95rem;
        }

        .input-row {
          gap: 8px;
          padding: 10px 10px 12px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell" aria-label="Interactive fiction terminal">
      <header class="topbar">
        <h1 class="title">The Lurking Horror</h1>
        <div class="actions">
          <button id="load-bundled" class="btn" type="button">Load Bundled</button>
          <button id="load-local" class="btn" type="button">Load Local File</button>
        </div>
        <span class="hint">Arrow keys: history</span>
      </header>

      <section id="output" class="output" aria-live="polite"></section>

      <section class="status" aria-label="Status line">
        <span id="status-left">Loading shell...</span>
        <span id="status-right">Ready</span>
      </section>

      <section class="input-row" aria-label="Command input">
        <span id="prompt" class="prompt">&gt;</span>
        <input
          id="command-input"
          class="command-input"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="Enter command..."
          aria-label="Command input"
        />
      </section>
    </main>

    <script src="./ui-framework.js"></script>
    <script src="./parser.js"></script>
    <script src="./vm-core.js"></script>
    <script src="./io.js"></script>
    <script>
      (function bootstrapUi() {
        const localFileInput = document.createElement('input');
        localFileInput.type = 'file';
        localFileInput.accept = '.z3,.z5,.z8,.zblorb,.zlb';
        localFileInput.style.display = 'none';
        document.body.appendChild(localFileInput);

        const ui = new window.UiFramework({
          outputEl: document.getElementById('output'),
          inputEl: document.getElementById('command-input'),
          promptEl: document.getElementById('prompt'),
          statusLeftEl: document.getElementById('status-left'),
          statusRightEl: document.getElementById('status-right'),
          prompt: '>',
        });

        const controller = new window.GameIoController(ui);
        ui.appendOutput('Shell ready. Load a story to start.', 'system');
        ui.setStatus('No story loaded', 'Idle');

        ui.focusInput();
        window.appUi = ui;
        window.gameController = controller;

        document.getElementById('load-bundled').addEventListener('click', async () => {
          try {
            await controller.loadStoryFromUrl('../data/The_Lurking_Horror_Infocom_Release_219_Serial_870912.z3');
          } catch (error) {
            ui.appendOutput('Failed to load bundled story: ' + error.message, 'error');
            ui.setStatus('Load failed', 'Error');
          }
        });

        document.getElementById('load-local').addEventListener('click', () => {
          localFileInput.value = '';
          localFileInput.click();
        });

        localFileInput.addEventListener('change', async event => {
          const file = event.target.files && event.target.files[0];
          if (!file) {
            return;
          }
          try {
            const buffer = await file.arrayBuffer();
            await controller.loadStoryFromArrayBuffer(buffer);
          } catch (error) {
            ui.appendOutput('Failed to load selected file: ' + error.message, 'error');
            ui.setStatus('Load failed', 'Error');
          }
        });
      })();
    </script>
  </body>
</html>
