      :root {
        --bg: #0d0c0a;
        --panel: #1a1814;
        --panel-line: #4d4638;
        --ink: #ece3c9;
        --muted: #b6ab8b;
        --room-fill: #262319;
        --room-line: #a3966f;
        --edge: #d8cfb3;
        --edge-enter: #93b7ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background: radial-gradient(circle at 20% 10%, #1f1a14 0%, var(--bg) 55%);
        color: var(--ink);
      }

      .page {
        max-width: 1480px;
        margin: 20px auto;
        padding: 0 16px 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        font-weight: 700;
      }

      p {
        margin: 0 0 12px;
        color: var(--muted);
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin-bottom: 14px;
        color: var(--muted);
      }

      .controls label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .frame {
        border: 1px solid var(--panel-line);
        background: linear-gradient(180deg, #17140f 0%, #13110d 100%);
        overflow: hidden;
        height: calc(100vh - 190px);
        min-height: 620px;
      }

      svg {
        width: 100%;
        height: 100%;
        display: block;
        cursor: grab;
        user-select: none;
      }

      svg.dragging {
        cursor: grabbing;
      }

      .layer {
        fill: #191611;
        stroke: var(--panel-line);
        stroke-width: 1;
      }

      .layer-title {
        fill: var(--muted);
        font-size: 18px;
        text-anchor: middle;
      }

      .room {
        fill: var(--room-fill);
        stroke: var(--room-line);
        stroke-width: 1.3;
        rx: 8;
      }

      .room-section-b {
        stroke: #8fb9cf;
      }

      .room-section-c {
        stroke: #c6aa78;
      }

      .room-label {
        fill: var(--ink);
        font-size: 14px;
        text-anchor: middle;
        dominant-baseline: central;
      }

      .room-label-id {
        fill: var(--muted);
        font-size: 11px;
        text-anchor: middle;
        dominant-baseline: central;
      }

      .edge {
        stroke: var(--edge);
        stroke-width: 2;
        fill: none;
        marker-end: url(#arrow);
      }

      .edge-enter {
        stroke: var(--edge-enter);
        stroke-width: 3;
        stroke-dasharray: 6 5;
        marker-end: url(#arrow-enter);
      }

      .edge-puzzle {
        stroke-dasharray: 7 5;
        opacity: 0.9;
      }

      .edge-restricted {
        stroke-dasharray: 2 6;
        opacity: 0.95;
      }

      .edge-label-bg {
        fill: rgba(16, 14, 11, 0.88);
        stroke: var(--panel-line);
        stroke-width: 0.8;
        rx: 4;
      }

      .edge-label {
        fill: var(--ink);
        font-size: 15px;
        text-anchor: middle;
        dominant-baseline: central;
      }

      .section-frame {
        fill: rgba(43, 38, 29, 0.24);
        stroke: rgba(203, 189, 151, 0.45);
        stroke-width: 1;
        stroke-dasharray: 8 6;
        rx: 14;
      }

      .section-frame-b {
        stroke: rgba(143, 185, 207, 0.8);
      }

      .section-frame-c {
        stroke: rgba(198, 170, 120, 0.8);
      }

      .section-title {
        fill: #d7cbab;
        font-size: 16px;
        font-weight: 700;
      }
    </style>
  </head>

        { id: 174, name: "Department of Alchemy" },
        { id: 176, name: "Terminal Room" },
        { id: 179, name: "Cluttered Passage" },
        { id: 180, name: "Great Court" },
        { id: 181, name: "Wet Tunnel" },
        { id: 184, name: "Wet Tunnel" },
        { id: 185, name: "Smith Street" },
        { id: 187, name: "Wet Tunnel" },
        { id: 190, name: "Mass. Ave." },
        { id: 195, name: "Top Floor" },
        { id: 200, name: "Brown Basement" },
        { id: 201, name: "Renovated Cave" },
        { id: 202, name: "Temporary Basement" },
        { id: 206, name: "Infinite Corridor" },
        { id: 208, name: "Infinite Corridor" },
        { id: 210, name: "Infinite Corridor" },
        { id: 213, name: "Top of Dome" },
        { id: 214, name: "Infinite Corridor" },
        { id: 218, name: "Infinite Corridor" },
        { id: 221, name: "Steam Tunnel" },
        { id: 222, name: "Skyscraper Roof" },
        { id: 227, name: "Steam Tunnel" },
        { id: 232, name: "Wet Tunnel" },
        { id: 234, name: "Wet Tunnel" },
        { id: 240, name: "Brown Building" },
        { id: 248, name: "Chemistry Building" },
        { id: 249, name: "Great Dome" }
      ];

      const LOCATION_ID_BY_NODE_ID = {
        roof: 127,
        third: 110,
        elev_l2: 124,
        second: 137,
        kitchen: 33,
        terminal: 176,
        elev_l1: 124,
        computer: 65,
        smith1: 185,
        smith2: 98,
        temp_lab: 140,
        elev_l0: 124,
        aero_b: 158,
        base: 27,
        temp_b: 202,
        dead: 47,
        ancient: 171,
        elev_lm1: 124,
        stair: 35,
        brick: 25,
        reno: 201,
        cinder: 17,
        altar: 149,
        mass: 190,
        ic1: 218,
        ic2: 214,
        ic3: 210,
        ic4: 208,
        ic5: 206,
        aero_lobby: 136,
        eng: 38,
        gd: 249,
        td: 213,
        rgd: 121,
        ogd: 145,
        great_court: 180,
        chem: 248,
        alc: 174,
        lab: 42,
        fn: 150,
        cp: 179,
        brown: 240,
        brown_b: 200,
        top_floor: 195,
        sky_roof: 222,
        inside_dome: 109,
        small_court: 16,
        muddy: 39,
        tunnel_entry: 34,
        steam1: 66,
        steam2: 78,
        steam3: 138,
        steam4: 221,
        steam5: 227,
        concrete_box: 37,
        sub: 142,
        tomb: 9,
        large_chamber: 99,
        inner_lair: 69,
        wet_lair_link: 181,
        wet1: 187,
        wet2: 164,
        wet3: 15,
        wet4: 131,
        wet5: 234,
        wet6: 117,
        wet7: 87,
        wet8: 51,
        wet9: 232,
        wet10: 161,
        wet11: 184,
        place: 152,
        basalt: 134,
        platform: 21
      };

      // Wet-tunnel numbering is still unresolved against booklet inset numbering.
      // Keep those ids in the Unknown section until we reconcile exact placement.
      const FORCED_UNKNOWN_IDS = new Set([15, 51, 87, 117, 131, 161, 164, 181, 184, 187, 232, 234]);

      const CANONICAL_NAME_BY_ID = new Map(CANONICAL_LOCATIONS.map((location) => [location.id, location.name]));

      for (const room of MAP_MODEL.rooms) {
        const locationId = LOCATION_ID_BY_NODE_ID[room.id];
        if (typeof locationId === "number" && !FORCED_UNKNOWN_IDS.has(locationId)) {
          room.locationId = locationId;
          const canonicalName = CANONICAL_NAME_BY_ID.get(locationId);
          if (canonicalName) {
            room.label = canonicalName;
          }
        }
      }

      const knownLocationIds = new Set(
        MAP_MODEL.rooms.filter((room) => typeof room.locationId === "number").map((room) => room.locationId)
      );
      const missingLocations = CANONICAL_LOCATIONS.filter((location) => !knownLocationIds.has(location.id));
      const unknownStartX = 3500;
      const unknownStartY = 3450;
      const unknownGapX = 230;
      const unknownGapY = 76;
      const unknownColumns = 4;
      for (let index = 0; index < missingLocations.length; index += 1) {
        const location = missingLocations[index];
        const column = index % unknownColumns;
        const row = Math.floor(index / unknownColumns);
        MAP_MODEL.rooms.push({
          id: "unknown_" + location.id,
          label: location.name,
          locationId: location.id,
          section: "U",
          layer: "L0",
          x: unknownStartX + column * unknownGapX,
          y: unknownStartY + row * unknownGapY,
          edges: []
        });
      }

      // Align Subbasement (Section D) directly under Stairway and move linked lower sections with it.
      const sectionShiftX = {
        D: -3580,
        F: -3580,
        U: -3580
      };
      for (const room of MAP_MODEL.rooms) {
        const shiftX = sectionShiftX[room.section];
        if (typeof shiftX === "number") {
          room.x += shiftX;
        }
      }

      // Fine-tune wet-tunnel block placement independently from Section D anchors.
      const sectionFineTuneX = {
        F: -140,
        U: -140
      };
      for (const room of MAP_MODEL.rooms) {
        const shiftX = sectionFineTuneX[room.section];
        if (typeof shiftX === "number") {
          room.x += shiftX;
        }
      }

      // Expand vertical layer space with extra headroom for L+1 so the upper interior stack can breathe.
      const LAYER_STRETCH_FACTOR = {
        "L+2": 1.5,
        "L+1": 2.0,
        L0: 1.5,
        "L-1": 1.5,
        "L-2": 1.5
      };
      const oldLayerById = new Map(
        MAP_MODEL.layers.map((layer) => [
          layer.id,
          {
            y: layer.y,
            h: layer.h
          }
        ])
      );
      const layerGap = 70;
      let nextLayerY = MAP_MODEL.layers[0].y;
      for (const layer of MAP_MODEL.layers) {
        const old = oldLayerById.get(layer.id);
        if (!old) continue;
        layer.y = nextLayerY;
        const factor = LAYER_STRETCH_FACTOR[layer.id];
        layer.h = typeof factor === "number" ? Math.round(old.h * factor) : old.h;
        nextLayerY += layer.h + layerGap;
      }
      const newLayerById = new Map(
        MAP_MODEL.layers.map((layer) => [
          layer.id,
          {
            y: layer.y,
            h: layer.h
          }
        ])
      );
      for (const room of MAP_MODEL.rooms) {
        // Keep unknown-location parking grid fixed for manual triage.
        if (room.section === "U") continue;
        const oldLayer = oldLayerById.get(room.layer);
        const newLayer = newLayerById.get(room.layer);
        if (!oldLayer || !newLayer) continue;
        const ratio = (room.y - oldLayer.y) / oldLayer.h;
        room.y = newLayer.y + ratio * newLayer.h;
      }

      // Keep Terminal Room visually higher in the expanded L+1 band.
      const secondFloor = MAP_MODEL.rooms.find((room) => room.id === "second");
      const thirdFloor = MAP_MODEL.rooms.find((room) => room.id === "third");
      const terminalRoom = MAP_MODEL.rooms.find((room) => room.id === "terminal");
      const upperElevator = MAP_MODEL.rooms.find((room) => room.id === "elev_l2");
      if (secondFloor && thirdFloor && terminalRoom) {
        // Keep the core L+1 stack readable: terminal above third above second.
        thirdFloor.y = secondFloor.y - 190;
        terminalRoom.y = thirdFloor.y - 120;
      }
      if (thirdFloor && upperElevator) {
        // Keep elevator entry visually tied to third-floor level.
        upperElevator.y = thirdFloor.y + 45;
      }

      // Shift all elevator rooms one room to the right, and everything to their right with them.
      const ELEVATOR_SHIFT_X = ROOM_W + 30;
      const elevatorRoomIds = new Set(["elev_l2", "elev_l1", "elev_l0", "elev_lm1"]);
      const elevatorRooms = MAP_MODEL.rooms.filter((room) => elevatorRoomIds.has(room.id));
      const elevatorCutoffX =
        elevatorRooms.length > 0 ? Math.min(...elevatorRooms.map((room) => room.x)) : Number.POSITIVE_INFINITY;
      for (const room of MAP_MODEL.rooms) {
        if (room.section === "U") continue;
        if (room.x >= elevatorCutoffX) {
          room.x += ELEVATOR_SHIFT_X;
        }
      }

      // Anchor Wet Tunnel 1 directly below Large Chamber for clear vertical lineage.
      const largeChamber = MAP_MODEL.rooms.find((room) => room.id === "large_chamber");
      const wetTunnel1 = MAP_MODEL.rooms.find((room) => room.id === "wet1");
      if (largeChamber && wetTunnel1) {
        wetTunnel1.x = largeChamber.x;
      }

      const roomById = new Map(MAP_MODEL.rooms.map((room) => [room.id, room]));
      const layerIds = new Set(MAP_MODEL.layers.map((layer) => layer.id));
      const sectionIds = new Set(MAP_MODEL.sections.map((section) => section.id));
      const edges = [];

      for (const room of MAP_MODEL.rooms) {
        if (!layerIds.has(room.layer)) {
          throw new Error("Unknown layer '" + room.layer + "' for room '" + room.id + "'.");
        }
        if (!sectionIds.has(room.section)) {
          throw new Error("Unknown section '" + room.section + "' for room '" + room.id + "'.");
        }
        for (const edge of room.edges) {
          edges.push({
            from: room.id,
            to: edge.to,
            label: edge.label,
            type: edge.type || "normal",
            section: room.section
          });
        }
      }

      for (const edge of edges) {
        if (!roomById.has(edge.from) || !roomById.has(edge.to)) {
          throw new Error("Unknown room id in edge " + edge.from + " -> " + edge.to + ".");
        }
      }

      function add(tag, attrs, text) {
        const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
        Object.entries(attrs || {}).forEach(([k, v]) => el.setAttribute(k, String(v)));
        if (text != null) el.textContent = text;
        (viewport || svg).appendChild(el);
        return el;
      }

      function roomRect(room) {
        return {
          x: room.x - ROOM_W / 2,
          y: room.y - ROOM_H / 2,
          w: ROOM_W,
          h: ROOM_H
        };
      }

      function edgeEndpoints(from, to) {
        const a = roomRect(from);
        const b = roomRect(to);
        const dx = to.x - from.x;
        const dy = to.y - from.y;
        if (Math.abs(dx) > Math.abs(dy)) {
          if (dx > 0) return { x1: a.x + a.w, y1: from.y, x2: b.x, y2: to.y };
          return { x1: a.x, y1: from.y, x2: b.x + b.w, y2: to.y };
        }
        if (dy > 0) return { x1: from.x, y1: a.y + a.h, x2: to.x, y2: b.y };
        return { x1: from.x, y1: a.y, x2: to.x, y2: b.y + b.h };
      }

      function drawEdgeLabel(mx, my, label) {
        const pad = 10;
        const width = Math.max(52, Math.min(140, label.length * 7 + pad * 2));
        add("rect", { class: "edge-label-bg", x: mx - width / 2, y: my - 12, width, height: 24 });
        add("text", { class: "edge-label", x: mx, y: my + 1 }, label);
      }

      function drawSectionFrames() {
        const marginX = 125;
        const marginY = 60;
        for (const section of MAP_MODEL.sections) {
          const sectionRooms = MAP_MODEL.rooms.filter((room) => room.section === section.id);
          if (!sectionRooms.length) continue;
          let minX = Infinity;
          let maxX = -Infinity;
          let minY = Infinity;
          let maxY = -Infinity;
          for (const room of sectionRooms) {
            const r = roomRect(room);
            minX = Math.min(minX, r.x);
            maxX = Math.max(maxX, r.x + r.w);
            minY = Math.min(minY, r.y);
            maxY = Math.max(maxY, r.y + r.h);
          }
          const sectionClass = "section-frame section-frame-" + section.id.toLowerCase();
          add("rect", {
            class: sectionClass,
            x: minX - marginX,
            y: minY - marginY,
            width: maxX - minX + marginX * 2,
            height: maxY - minY + marginY * 2
          });
          add("text", { class: "section-title", x: minX - marginX + 16, y: minY - marginY + 28 }, section.label);
        }
      }

      function draw() {
        svg.innerHTML = "";
        viewport = null;
        const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
        svg.appendChild(defs);
        viewport = document.createElementNS("http://www.w3.org/2000/svg", "g");
        viewport.setAttribute("id", "viewport");
        svg.appendChild(viewport);

        const marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
        marker.setAttribute("id", "arrow");
        marker.setAttribute("viewBox", "0 0 10 10");
        marker.setAttribute("refX", "9");
        marker.setAttribute("refY", "5");
        marker.setAttribute("markerWidth", "8");
        marker.setAttribute("markerHeight", "8");
        marker.setAttribute("orient", "auto-start-reverse");
        defs.appendChild(marker);
        const arrowPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
        arrowPath.setAttribute("d", "M 0 0 L 10 5 L 0 10 z");
        arrowPath.setAttribute("fill", "#d8cfb3");
        marker.appendChild(arrowPath);

        const enterMarker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
        enterMarker.setAttribute("id", "arrow-enter");
        enterMarker.setAttribute("viewBox", "0 0 10 10");
        enterMarker.setAttribute("refX", "9");
        enterMarker.setAttribute("refY", "5");
        enterMarker.setAttribute("markerWidth", "8");
        enterMarker.setAttribute("markerHeight", "8");
        enterMarker.setAttribute("orient", "auto-start-reverse");
        defs.appendChild(enterMarker);
        const enterPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
        enterPath.setAttribute("d", "M 0 0 L 10 5 L 0 10 z");
        enterPath.setAttribute("fill", "#93b7ff");
        enterMarker.appendChild(enterPath);

        add("rect", { x: 0, y: 0, width: WORLD_W, height: WORLD_H, fill: "transparent" });

        for (const layer of MAP_MODEL.layers) {
          add("rect", { class: "layer", x: LAYER_X, y: layer.y, width: LAYER_W, height: layer.h });
          add("text", { class: "layer-title", x: LAYER_X + LAYER_W / 2, y: layer.y + 28 }, layer.id);
        }

        const labelsOn = document.getElementById("toggle-labels").checked;
        const showEnter = document.getElementById("toggle-enter").checked;
        const showSections = document.getElementById("toggle-sections").checked;

        if (showSections) {
          drawSectionFrames();
        }

        for (const edge of edges.filter((e) => e.type !== "enter")) {
          const from = roomById.get(edge.from);
          const to = roomById.get(edge.to);
          if (!from || !to) continue;

          const p = edgeEndpoints(from, to);
          const edgeClass =
            edge.type === "puzzle" ? "edge edge-puzzle" : edge.type === "restricted" ? "edge edge-restricted" : "edge";
          add("line", { class: edgeClass, x1: p.x1, y1: p.y1, x2: p.x2, y2: p.y2 });

          if (labelsOn) {
            const mx = (p.x1 + p.x2) / 2;
            const my = (p.y1 + p.y2) / 2;
            drawEdgeLabel(mx, my, edge.label);
          }
        }

        for (const edge of edges.filter((e) => e.type === "enter")) {
          if (edge.type === "enter" && !showEnter) continue;
          const from = roomById.get(edge.from);
          const to = roomById.get(edge.to);
          if (!from || !to) continue;

          const p = edgeEndpoints(from, to);
          add("line", { class: "edge edge-enter", x1: p.x1, y1: p.y1, x2: p.x2, y2: p.y2 });

          if (labelsOn) {
            const mx = (p.x1 + p.x2) / 2;
            const my = (p.y1 + p.y2) / 2;
            drawEdgeLabel(mx, my, edge.label);
          }
        }

        for (const room of MAP_MODEL.rooms) {
          const r = roomRect(room);
          const roomClass = "room room-section-" + room.section.toLowerCase();
          add("rect", { class: roomClass, x: r.x, y: r.y, width: r.w, height: r.h });
          add("text", { class: "room-label", x: room.x, y: room.y - 7 }, room.label);
          if (typeof room.locationId === "number") {
            add("text", { class: "room-label-id", x: room.x, y: room.y + 10 }, "[" + String(room.locationId) + "]");
          }
        }

        if (!panZoom.hasUserMoved) {
          setInitialView();
        } else {
          applyTransform();
        }
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function applyTransform() {
        if (!viewport) return;
        viewport.setAttribute(
          "transform",
          "translate(" + panZoom.tx.toFixed(2) + " " + panZoom.ty.toFixed(2) + ") scale(" + panZoom.scale.toFixed(4) + ")"
        );
      }

      function setInitialView() {
        const rect = svg.getBoundingClientRect();
        const focus = roomById.get("terminal");
        if (!focus) return;
        panZoom.scale = 0.42;
        panZoom.tx = rect.width / 2 - focus.x * panZoom.scale;
        panZoom.ty = rect.height * 0.36 - 920 * panZoom.scale;
        applyTransform();
      }

      function onPointerDown(event) {
        if (event.button !== 0) return;
        panZoom.dragging = true;
        panZoom.lastX = event.clientX;
        panZoom.lastY = event.clientY;
        svg.classList.add("dragging");
      }

      function onPointerMove(event) {
        if (!panZoom.dragging) return;
        const dx = event.clientX - panZoom.lastX;
        const dy = event.clientY - panZoom.lastY;
        panZoom.lastX = event.clientX;
        panZoom.lastY = event.clientY;
        panZoom.tx += dx;
        panZoom.ty += dy;
        panZoom.hasUserMoved = true;
        applyTransform();
      }

      function onPointerUp() {
        if (!panZoom.dragging) return;
        panZoom.dragging = false;
        svg.classList.remove("dragging");
      }

      function onWheel(event) {
        event.preventDefault();
        const rect = svg.getBoundingClientRect();
        const sx = event.clientX - rect.left;
        const sy = event.clientY - rect.top;
        const zoomFactor = event.deltaY < 0 ? 1.1 : 0.9;
        const nextScale = clamp(panZoom.scale * zoomFactor, panZoom.minScale, panZoom.maxScale);
        const wx = (sx - panZoom.tx) / panZoom.scale;
        const wy = (sy - panZoom.ty) / panZoom.scale;
        panZoom.scale = nextScale;
        panZoom.tx = sx - wx * panZoom.scale;
        panZoom.ty = sy - wy * panZoom.scale;
        panZoom.hasUserMoved = true;
        applyTransform();
      }

      document.getElementById("toggle-labels").addEventListener("change", draw);
      document.getElementById("toggle-enter").addEventListener("change", draw);
      document.getElementById("toggle-sections").addEventListener("change", draw);
      svg.addEventListener("mousedown", onPointerDown);
      window.addEventListener("mousemove", onPointerMove);
      window.addEventListener("mouseup", onPointerUp);
      svg.addEventListener("mouseleave", onPointerUp);
      svg.addEventListener("wheel", onWheel, { passive: false });
      window.addEventListener("resize", () => {
        if (!panZoom.hasUserMoved) {
          setInitialView();
        } else {
          applyTransform();
        }
      });
      draw();
    </script>
  </body>
